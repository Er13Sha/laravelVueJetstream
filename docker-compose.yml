name: property

# ---------------------------------------------------------------------------
# Локальная разработка. Код примонтирован в контейнеры (volume .:/app),
# поэтому любые правки видны сразу, без пересборки образа.
#
# Контейнеры:
#   db        — PostgreSQL
#   php       — PHP-FPM, выполняет код Laravel (это и есть «backend» + «php»)
#   frontend  — Vite dev-сервер (Node) с HMR
#   nginx     — веб-сервер: статика + проксирование PHP в php:9000
#
# После старта приложение доступно на http://localhost:8088
# ---------------------------------------------------------------------------

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-property}
      POSTGRES_USER: ${DB_USERNAME:-property}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5433:5432"            # наружу 5433, чтобы не конфликтовать с локальным PostgreSQL
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-property} -d ${DB_DATABASE:-property}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── PHP-FPM (backend) ───────────────────────────────────────────────────
  # Здесь выполняется код Laravel. «backend» и «php» — это один и тот же сервис.
  php:
    build:
      context: .
      target: dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Внутри docker-сети до Postgres ходим по имени сервиса db:5432,
      # а НЕ по 127.0.0.1:5433 (это адрес только для хоста). Реальные env-переменные
      # имеют приоритет над .env-файлом, поэтому здесь мы безопасно их переопределяем.
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-property}
      DB_USERNAME: ${DB_USERNAME:-property}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      APP_URL: http://localhost:8088
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(\"127.0.0.1\", 9000) ? 0 : 1);'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s       # запас на первый composer install + миграции
    restart: unless-stopped

  # ─── Frontend (Vite dev-сервер) ──────────────────────────────────────────
  frontend:
    image: node:24-alpine
    working_dir: /app
    environment:
      DOCKER: "true"           # включает usePolling в vite.config.js (нужно для bind-mount на Windows)
    # Ставим зависимости в Linux-окружении контейнера (host node_modules не подходят — там бинарники под Windows),
    # затем поднимаем Vite на 0.0.0.0, чтобы он был доступен с хоста.
    command: sh -c "if [ ! -x node_modules/.bin/vite ]; then npm install; fi && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
    restart: unless-stopped

  # ─── nginx (веб-сервер) ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    depends_on:
      php:
        condition: service_healthy
    ports:
      - "8088:80"
    volumes:
      - .:/app:ro
      - ./docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  db-data:
  node-modules:
