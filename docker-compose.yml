name: property

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-property}
      POSTGRES_USER: ${DB_USERNAME:-property}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-property} -d ${DB_DATABASE:-property}"]
      interval: 5s
      timeout: 5s
      retries: 10

  php:
    build:
      context: .
      target: dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-property}
      DB_USERNAME: ${DB_USERNAME:-property}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      APP_URL: http://localhost:8088
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(\"127.0.0.1\", 9000) ? 0 : 1);'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 120s       # запас на первый composer install + миграции
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      php:
        condition: service_healthy
    ports:
      - "8088:80"
    volumes:
      - .:/app:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  db-data:
  node-modules:
