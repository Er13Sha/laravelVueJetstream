server {
    listen 80;
    server_name _;
    charset utf-8;

    root /app/public;
    index index.php;

    client_max_body_size 20m;

    # Картинки и превью из storage (Jetstream profile photos и т.п.).
    location /storage/ {
        alias /app/storage/app/public/;
        access_log off;
        expires 7d;
    }

    # Собранные ассеты (используются, если Vite dev-сервер не запущен).
    # В dev актуальные ассеты браузер берёт напрямую с http://localhost:5173 (см. @vite).
    location /build/ {
        access_log off;
        expires 30d;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Всё остальное — через Laravel.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP — в контейнер php-fpm (сервис называется php).
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
